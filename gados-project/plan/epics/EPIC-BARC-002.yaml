  - STORY-BARC-015: Master Dashboard Scaling (Multi-Tenant Support) (P1)
  - STORY-BARC-016: Cloud & Security DSA Module Expansion (P1)

milestones:
  - M1: Durable Backbone (40%) - Temporal integrated and base workflow active.
  - M2: Scale & Specialty (40%) - Expanded domains and multi-tenant isolation.
  - M3: Industrial UAT (20%) - Holistic testing of long-running flows.

